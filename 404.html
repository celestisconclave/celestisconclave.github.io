<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404 - Lost in Deep Space</title>
        <style>
            :root {
                --space-purple: #020008;
                --nebula-core: #0b031b;
                --gold: #d4af37;
                --gold-hover: #f1d592;
            }

            body,
            html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: radial-gradient(circle at center, var(--nebula-core) 0%, var(--space-purple) 100%);
                font-family:
                    'Inter',
                    -apple-system,
                    BlinkMacSystemFont,
                    'Segoe UI',
                    Roboto,
                    sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                color: white;
            }

            /* Parallax Layers */
            .parallax-layer {
                position: absolute;
                top: -10%;
                left: -10%;
                width: 120%;
                height: 120%;
                pointer-events: none;
                will-change: transform;
            }

            .star {
                position: absolute;
                background: white;
                border-radius: 50%;
            }

            /* Twinkle Animation */
            @keyframes twinkle {
                0%,
                100% {
                    opacity: 0.3;
                    transform: scale(1);
                }
                50% {
                    opacity: 1;
                    transform: scale(1.2);
                }
            }

            /* Content Styling */
            .content {
                position: relative;
                z-index: 100;
                text-align: center;
            }

            .error-code {
                font-size: 15rem;
                font-weight: 800;
                margin: 0;
                line-height: 1;
                letter-spacing: -5px;
                background: linear-gradient(to bottom, #fff 40%, #888 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.1));
            }

            .subtext {
                font-size: 1.5rem;
                letter-spacing: 0.5rem;
                text-transform: uppercase;
                margin-bottom: 3rem;
                opacity: 0.7;
            }

            /* Golden Button */
            .btn-return {
                background: transparent;
                color: var(--gold);
                border: 2px solid var(--gold);
                padding: 18px 45px;
                font-size: 1rem;
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 2px;
                cursor: pointer;
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                text-decoration: none;
                display: inline-block;
                border-radius: 4px;
            }

            .btn-return:hover {
                background: var(--gold);
                color: #000;
                box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
                transform: scale(1.05);
            }

            /* Mobile Responsiveness */
            @media (max-width: 768px) {
                .error-code {
                    font-size: 8rem;
                    letter-spacing: -3px;
                }

                .subtext {
                    font-size: 1rem;
                    letter-spacing: 0.2rem;
                }

                .btn-return {
                    padding: 12px 30px;
                    font-size: 0.9rem;
                    letter-spacing: 1px;
                }
            }

            @media (max-width: 480px) {
                .error-code {
                    font-size: 6rem;
                    letter-spacing: -2px;
                }

                .subtext {
                    font-size: 0.8rem;
                    letter-spacing: 0.1rem;
                }

                .btn-return {
                    padding: 10px 25px;
                    font-size: 0.8rem;
                }
            }
        </style>
    </head>
    <body>
        <div id="layer-distant" class="parallax-layer"></div>
        <div id="layer-mid" class="parallax-layer"></div>
        <div id="layer-near" class="parallax-layer"></div>

        <div class="content">
            <h1 class="error-code">404</h1>
            <p class="subtext">Lost in the Void</p>
            <a href="/" class="btn-return">Go Home</a>
        </div>

        <script>
            const layers = [
                { id: 'layer-distant', count: 120, size: 1, speed: 0.01, twinkle: true },
                { id: 'layer-mid', count: 60, size: 2, speed: 0.025, twinkle: false },
                { id: 'layer-near', count: 25, size: 3, speed: 0.05, twinkle: true },
            ];

            layers.forEach((layer) => {
                const container = document.getElementById(layer.id);
                for (let i = 0; i < layer.count; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';

                    const x = Math.random() * 100;
                    const y = Math.random() * 100;

                    star.style.left = `${x}%`;
                    star.style.top = `${y}%`;
                    star.style.width = `${layer.size}px`;
                    star.style.height = `${layer.size}px`;

                    if (layer.twinkle && Math.random() > 0.5) {
                        star.style.animation = `twinkle ${2 + Math.random() * 5}s infinite ease-in-out`;
                        star.style.animationDelay = `${Math.random() * 5}s`;
                    }

                    container.appendChild(star);
                }
            });

            document.addEventListener('mousemove', (e) => {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const moveX = e.clientX - centerX;
                const moveY = e.clientY - centerY;

                layers.forEach((layer) => {
                    const container = document.getElementById(layer.id);
                    const x = moveX * layer.speed;
                    const y = moveY * layer.speed;
                    container.style.transform = `translate(${x}px, ${y}px)`;
                });
            });
        </script>
    </body>
</html>
