<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Article — Celestis Conclave</title>
        <link rel="stylesheet" href="css/styles.css" />
        <link rel="stylesheet" href="css/article.css" />
        <link rel="icon" href="assets/images/logo.png" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
        <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
    </head>
    <body data-page="Blog">
        <nav id="navbar"></nav>

        <div id="reading-progress"></div>
        <button id="back-to-top" aria-label="Back to top" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">
            ⬆️
        </button>

        <main id="article-main" class="has-hero">
            <!-- Rendered by JS -->
        </main>

        <footer id="footer"></footer>

        <script src="js/data.js"></script>
        <script src="js/app.js"></script>
        <script>
            async function loadArticle() {
                const params = new URLSearchParams(window.location.search);
                const id = parseInt(params.get('id'));
                const article = SITE_DATA.articles.find((a) => a.id === id);
                const main = document.getElementById('article-main');

                if (!article) {
                    main.innerHTML = `<div class="container section" style="text-align:center">
          <h2>Article not found</h2>
          <a href="blog.html" class="btn btn-outline mt-md">← Back to Blog</a>
        </div>`;
                    return;
                }

                document.title = `${article.title} — Celestis Conclave`;

                // Render skeleton
                main.innerHTML = `
        <div class="article-hero" style="background-image: url('${article.coverImage}')">
          <div class="article-hero-overlay"></div>
          <div class="container article-hero-inner">
            <a href="blog.html" class="article-back">← Back to Blog</a>
            <div class="card-tags article-hero-tags">${tagPills(article.tags)}</div>
            <h1 class="article-headline">${article.title}</h1>
            <div class="article-meta">
              <span class="article-author">${article.author}</span>
              <span>·</span>
              <span>${formatDate(article.date)}</span>
              <span>·</span>
              <span class="reading-time" id="reading-time-badge">reading time</span>
            </div>
          </div>
        </div>
        <div class="container article-body-wrap">
          <article class="article-body md-content" id="article-content">
            <div class="article-loading">Loading article…</div>
          </article>
        </div>
      `;

                // Try to fetch markdown file
                // article.html lives at root level; mdFile paths in data.js are relative to root
                // so we can fetch them directly as-is. We also try with and without leading slash.
                try {
                    const url = article.mdFile.startsWith('http') ? article.mdFile : article.mdFile;
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const md = await resp.text();
                    document.getElementById('article-content').innerHTML = renderMarkdown(md);
                    // Render LaTeX — runs after KaTeX scripts have loaded (they're deferred)
                    requestAnimationFrame(() => {
                        if (typeof renderMathInElement !== 'undefined') {
                            renderMathInElement(document.getElementById('article-content'), {
                                delimiters: [
                                    { left: '$$', right: '$$', display: true },
                                    { left: '$', right: '$', display: false },
                                ],
                                throwOnError: false,
                            });
                        }
                    });
                } catch (err) {
                    // Fallback: show preview as placeholder
                    document.getElementById('article-content').innerHTML = `
          <p style="color:var(--clr-text-3); font-style:italic; font-family:var(--font-serif); margin-bottom:1rem;">
            The full article could not be loaded (<code>${article.mdFile}</code>). Make sure the file exists in your repository and the site is served over HTTP (not opened as a local file).
          </p>
          <p>${article.preview}</p>
        `;
                }
            }

            document.addEventListener('DOMContentLoaded', loadArticle);

            // ── READING TIME ─────────────────────────────────────────
            function calcReadingTime(text) {
                const words = text.trim().split(/\s+/).length;
                const mins = Math.max(1, Math.round(words / 200));
                return mins === 1 ? '1 min read' : `${mins} min read`;
            }

            // ── COPY BUTTONS ON CODE BLOCKS ──────────────────────────
            function initCopyButtons() {
                document.querySelectorAll('.md-content pre').forEach((pre) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'code-block-wrap';
                    pre.parentNode.insertBefore(wrap, pre);
                    wrap.appendChild(pre);

                    const btn = document.createElement('button');
                    btn.className = 'code-copy-btn';
                    btn.textContent = 'Copy';
                    btn.setAttribute('aria-label', 'Copy code');
                    wrap.appendChild(btn);

                    btn.addEventListener('click', () => {
                        const code = pre.querySelector('code')?.innerText || pre.innerText;
                        navigator.clipboard
                            .writeText(code)
                            .then(() => {
                                btn.textContent = 'Copied ✓';
                                btn.classList.add('copied');
                                setTimeout(() => {
                                    btn.textContent = 'Copy';
                                    btn.classList.remove('copied');
                                }, 2000);
                            })
                            .catch(() => {
                                // fallback
                                const ta = document.createElement('textarea');
                                ta.value = code;
                                ta.style.position = 'fixed';
                                ta.style.opacity = '0';
                                document.body.appendChild(ta);
                                ta.select();
                                document.execCommand('copy');
                                document.body.removeChild(ta);
                                btn.textContent = 'Copied ✓';
                                btn.classList.add('copied');
                                setTimeout(() => {
                                    btn.textContent = 'Copy';
                                    btn.classList.remove('copied');
                                }, 2000);
                            });
                    });
                });
            }

            // ── READING PROGRESS BAR ─────────────────────────────────
            function initReadingProgress() {
                const bar = document.getElementById('reading-progress');
                const backTop = document.getElementById('back-to-top');
                if (!bar) return;

                window.addEventListener(
                    'scroll',
                    () => {
                        const scrollTop = window.scrollY;
                        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                        const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
                        bar.style.width = pct + '%';

                        // Back to top visibility — show after 300px
                        if (backTop) {
                            backTop.classList.toggle('visible', scrollTop > 300);
                        }
                    },
                    { passive: true },
                );
            }

            // ── HOOK INTO loadArticle ─────────────────────────────────
            // Patch the markdown render call to also init these features
            const _origLoadArticle = loadArticle;
            document.addEventListener('DOMContentLoaded', () => {
                initReadingProgress();
            });

            // Override the point where article content is set
            // We do this by observing when article-content gets populated
            const _contentObserver = new MutationObserver(() => {
                const content = document.getElementById('article-content');
                if (!content || content.querySelector('.article-loading')) return;
                _contentObserver.disconnect();

                // Reading time — count words in rendered text
                const badge = document.getElementById('reading-time-badge');
                if (badge)
                    badge.innerHTML = `<i class="fa-solid fa-clock"></i>${calcReadingTime(
                        document.getElementById('article-content').innerText,
                    )}`;
                // Copy buttons
                initCopyButtons();
            });

            // Start observing once DOM is ready — the observer fires when
            // loadArticle sets the innerHTML of article-content
            document.addEventListener('DOMContentLoaded', () => {
                const content = document.getElementById('article-main');
                if (content) {
                    _contentObserver.observe(content, { childList: true, subtree: true });
                }
            });
        </script>
    </body>
</html>
