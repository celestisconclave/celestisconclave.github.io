<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Celestis Conclave</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/projects.css">
  <link rel="icon" href="assets/images/logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="Projects">
  <nav id="navbar"></nav>

  <main>
    <section class="page-hero section">
      <div class="container page-hero-inner">
        <span class="eyebrow">Member Projects</span>
        <h1>What We <em class="gold">Build</em></h1>
        <p style="color:var(--clr-text-2); max-width:520px; margin-top:0.75rem;">
          Open-source projects spanning astrophysics, machine learning, electronics, and beyond.
        </p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <!-- Filter bar -->
        <div class="filter-bar" id="filter-bar">
          <input type="text" id="project-search" class="filter-search" placeholder="Search projects…">
          <div class="filter-tags" id="project-tag-filters">
            <!-- Injected by JS -->
          </div>
        </div>

        <div class="grid-3" id="projects-grid">
          <!-- Injected by JS -->
        </div>

        <p id="no-results" class="no-results" style="display:none; text-align:center; color:var(--clr-text-3); margin-top:3rem; font-family:var(--font-serif); font-size:1.1rem;">
          No projects match your search.
        </p>
      </div>
    </section>
  </main>

  <!-- Project Modal -->
  <div class="modal-overlay" id="project-modal" role="dialog" aria-modal="true">
    <div class="modal" id="project-modal-content">
      <button class="modal-close" id="project-modal-close" aria-label="Close">×</button>
      <!-- Injected by JS -->
    </div>
  </div>

  <footer id="footer"></footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
