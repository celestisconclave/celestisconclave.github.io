<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resources — Celestis Conclave</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/resources.css">
  <link rel="icon" href="assets/images/logo.png">
</head>
<body data-page="Resources">
  <nav id="navbar"></nav>

  <main>
    <section class="page-hero section">
      <div class="container page-hero-inner">
        <span class="eyebrow">Curated Learning</span>
        <h1>Resources & <em class="gold">Tutorials</em></h1>
        <p style="color:var(--clr-text-2); max-width:520px; margin-top:0.75rem;">
          Handpicked books, courses, tools, and references across all STEM disciplines.
        </p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="filter-bar">
          <input type="text" id="resource-search" class="filter-search" placeholder="Search resources…">
          <div class="filter-tags" id="resource-tag-filters"></div>
        </div>

        <!-- Category groups rendered by JS -->
        <div id="resources-container"></div>

        <p id="no-results" style="display:none; text-align:center; color:var(--clr-text-3); margin-top:3rem; font-family:var(--font-serif); font-size:1.1rem;">
          No resources match your search.
        </p>
      </div>
    </section>
  </main>

  <footer id="footer"></footer>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    let activeResourceTags = new Set();
    let resourceSearch = '';

    const CATEGORY_ICONS = {
      Video: '▶',
      Course: '◎',
      Book: '◈',
      Platform: '⊕',
      Research: '◐',
      Notes: '◑',
      Tool: '⊗',
      Other: '✦'
    };

    function getAllResourceTags() {
      const tags = new Set();
      SITE_DATA.resources.forEach(r => r.tags.forEach(t => tags.add(t)));
      return [...tags].sort();
    }

    function renderResourceFilters() {
      const container = document.getElementById('resource-tag-filters');
      if (!container) return;
      const tags = getAllResourceTags();
      container.innerHTML = tags.map(t =>
        `<button class="tag-pill ${activeResourceTags.has(t) ? 'active' : ''}" data-tag="${t}">${t}</button>`
      ).join('');
      container.querySelectorAll('.tag-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          const tag = btn.dataset.tag;
          if (activeResourceTags.has(tag)) { activeResourceTags.delete(tag); btn.classList.remove('active'); }
          else { activeResourceTags.add(tag); btn.classList.add('active'); }
          renderResources();
        });
      });
    }

    function filterResources() {
      let items = SITE_DATA.resources;
      if (resourceSearch) {
        const q = resourceSearch.toLowerCase();
        items = items.filter(r =>
          r.title.toLowerCase().includes(q) ||
          r.description.toLowerCase().includes(q) ||
          r.tags.some(t => t.toLowerCase().includes(q))
        );
      }
      if (activeResourceTags.size > 0) {
        items = items.filter(r => [...activeResourceTags].every(t => r.tags.includes(t)));
      }
      return items;
    }

    function renderResources() {
      const container = document.getElementById('resources-container');
      const noResults = document.getElementById('no-results');
      const items = filterResources();
      noResults.style.display = items.length === 0 ? '' : 'none';

      if (resourceSearch || activeResourceTags.size > 0) {
        // Flat grid when filtering
        container.innerHTML = `<div class="grid-3">${items.map(r => resourceCard(r)).join('')}</div>`;
      } else {
        // Group by category
        const cats = {};
        items.forEach(r => {
          if (!cats[r.category]) cats[r.category] = [];
          cats[r.category].push(r);
        });
        container.innerHTML = Object.entries(cats).map(([cat, rs]) => `
          <div class="resource-category-section">
            <div class="resource-category-header">
              <span class="resource-cat-icon">${CATEGORY_ICONS[cat] || '✦'}</span>
              <h3>${cat}s</h3>
            </div>
            <div class="grid-3">${rs.map(r => resourceCard(r)).join('')}</div>
          </div>
        `).join('');
      }
    }

    function resourceCard(r) {
      return `
        <a href="${r.link}" target="_blank" rel="noopener" class="resource-card card">
          <div class="resource-card-body">
            <div class="resource-cat-badge">${r.category}</div>
            <h4 class="resource-title">${r.title}</h4>
            <p class="resource-desc">${r.description}</p>
            <div class="card-tags" style="margin-top:0.75rem">${tagPills(r.tags)}</div>
            <span class="resource-link-cue">Visit Resource →</span>
          </div>
        </a>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderResourceFilters();
      renderResources();
      document.getElementById('resource-search')?.addEventListener('input', e => {
        resourceSearch = e.target.value.trim();
        renderResources();
      });
    });
  </script>
</body>
</html>
